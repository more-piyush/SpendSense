data_mode: raw
raw_data_dir: /tmp/bls_raw
output_dir: /tmp/bls_output

local_intrvw24_path: /tmp/intrvw24.zip
local_hg_path: /tmp/CE-HG-Integ-2024.txt

output_s3:
  bucket: training-data
  cat_key: bls_pipeline/categorization_training.parquet
  trend_key: bls_pipeline/trend_training.parquet
  report_key: bls_pipeline/pipeline_report.json

