# configs/cat_distilbert_v1.yaml
# DistilBERT tuned: higher learning rate + layer freezing
# Purpose: Tradeoff — faster training by freezing early layers, potentially
#   better generalization since frozen layers retain pre-trained knowledge.
#   Higher LR compensates for fewer trainable parameters.

run_name: "cat_distilbert_v1_frozen"
model_type: distilbert
task_type: categorization
model_id: cat_distilbert_v1
model_family: distilbert
training_mode: initial
registry_path: s3://mlflow/registry

# Model
pretrained_model: distilbert-base-uncased
max_length: 64

# Training — key changes from base
learning_rate: 0.00005    # 5e-5 (2.5x higher than base)
batch_size: 16            # Smaller batch for better gradient signal
epochs: 5
warmup_ratio: 0.15        # Slightly longer warmup for stability
weight_decay: 0.02
dropout: 0.2              # Less dropout (layers 0-3 frozen = less overfitting)
freeze_layers: 3          # Freeze first 3 of 6 transformer layers
early_stopping_patience: 2
mixed_precision: true

# Loss
loss: bce_with_logits

# Data — loaded from MinIO training-data bucket (produced by teammate's data pipeline)
data_path: s3://training-data/bls_pipeline/categorization_training.parquet
s3:
  endpoint_url: http://CHAMELEON_FLOATING_IP:9000
  region: us-east-1

# MLflow
mlflow_tracking_uri: http://CHAMELEON_FLOATING_IP:8000
experiment_name: categorization
direct_artifact_experiment_name: categorization_s3
artifact_location: s3://mlflow/experiments/categorization_s3
