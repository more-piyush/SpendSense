# configs/retrain_trend.yaml
# Retraining configuration for XGBoost trend detection

model_type: XGBOOST_TREND

# Feedback collection
feedback_source: file
feedback_path: /data/feedback/trend_feedback.parquet

# Trigger settings
schedule: monthly
min_feedback_signals: 10
last_retrain_date: null

# Phase 2 fine-tuning hyperparameters (Section 5.2.2)
n_estimators: 100              # 50-100 additional trees for per-user
max_depth: 6
phase2_learning_rate: 0.01     # Per-user fine-tuning rate
reg_alpha: 0.2                 # Increased regularization
reg_lambda: 2.0

# External data
external_data_path: /data/trend_training.parquet

# Drift detection
reference_features_path: /data/reference_trend_features.parquet
current_features_path: /data/current_trend_features.parquet

# Promotion
mlflow_tracking_uri: http://CHAMELEON_FLOATING_IP:8000
experiment_name: trend_retrain
registry_path: /data/model_registry

# State persistence
state_file: /data/retrain_state_trend.json
retrain_data_path: /tmp/retrain_trend.parquet
