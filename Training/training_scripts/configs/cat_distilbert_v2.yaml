# configs/cat_distilbert_v2.yaml
# DistilBERT aggressive: high LR, low dropout, small batch
# Purpose: Tests the overfitting boundary. Expects best training metrics
#   but potentially worse validation. Helps calibrate regularization.

run_name: "cat_distilbert_v2_aggressive"
model_type: distilbert
task_type: categorization
model_id: cat_distilbert_v2
model_family: distilbert
training_mode: initial
registry_path: s3://mlflow/registry

# Model
pretrained_model: distilbert-base-uncased
max_length: 64

# Training — aggressive settings
learning_rate: 0.0001     # 1e-4 (5x higher than base)
batch_size: 8             # Very small batch (noisy gradients)
epochs: 8                 # More epochs (expect early stopping)
warmup_ratio: 0.05        # Minimal warmup
weight_decay: 0.005       # Lighter regularization
dropout: 0.1              # Minimal dropout
freeze_layers: 0          # All layers trainable
early_stopping_patience: 2
mixed_precision: true

# Loss
loss: bce_with_logits

# Data — loaded from MinIO training-data bucket (produced by teammate's data pipeline)
data_path: s3://training-data/bls_pipeline/categorization_training.parquet
s3:
  endpoint_url: http://CHAMELEON_FLOATING_IP:9000
  region: us-east-1

# MLflow
mlflow_tracking_uri: http://CHAMELEON_FLOATING_IP:8000
experiment_name: categorization
direct_artifact_experiment_name: categorization_s3
artifact_location: s3://mlflow/experiments/categorization_s3
