# configs/cat_distilbert_m1medium_v1.yaml
# DistilBERT V1: Tuned hyperparameters — higher LR, longer warmup, more data
# Mirrors the distilbert_v1 vs distilbert_base pattern but on frozen backbone.
#
# Changes from m1medium base:
#   - Higher learning rate (1e-3 vs 5e-4)
#   - Smaller batch (4 vs 8) for noisier gradients / better generalization
#   - More epochs (5 vs 3) with patience=2
#   - Longer warmup (0.15 vs 0.1) for stability with higher LR
#   - Slightly more weight decay (0.02 vs 0.01)
#   - Lower dropout (0.15 vs 0.2) — frozen backbone = less overfitting risk
#   - More data (50k vs 30k) to support longer training
#
# Trainable params: ~1M (same frozen backbone)
# Expected runtime on m1.medium: ~60-90 minutes

run_name: "cat_distilbert_m1medium_v1_tuned"
model_type: distilbert

# Model
pretrained_model: distilbert-base-uncased
max_length: 48

# Training — tuned settings
learning_rate: 0.001      # 1e-3 (2x higher than base)
batch_size: 4             # Smaller batch for better gradient signal
epochs: 3
warmup_ratio: 0.15        # Longer warmup for stability
weight_decay: 0.02
dropout: 0.15             # Less dropout (frozen backbone = less overfitting)
freeze_layers: 6          # Freeze ALL transformer layers
freeze_embeddings: true   # Freeze embeddings
early_stopping_patience: 2
mixed_precision: false

# Loss
loss: bce_with_logits

# Data
data_path: /data/categorization_training.parquet
max_samples: 50000

# MLflow
mlflow_tracking_uri: http://mlflow:8000
experiment_name: categorization
