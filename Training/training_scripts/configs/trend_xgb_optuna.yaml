# configs/trend_xgb_optuna.yaml
# XGBoost with Optuna Bayesian hyperparameter tuning
# Purpose: Find optimal hyperparameters automatically via 50 trials.
#   Expected to be the best-performing candidate but most expensive to train.

run_name: "trend_xgb_optuna_tuned"
model_type: xgboost_optuna

# Optuna settings
optuna_n_trials: 50

# Isolation Forest ensemble (trained after best XGBoost is found)
train_isolation_forest: true
iso_n_estimators: 100
iso_contamination: 0.1
iso_max_samples: 256
xgb_ensemble_weight: 0.6

# Data
data_path: /data/trend_training.parquet

# MLflow
mlflow_tracking_uri: http://CHAMELEON_FLOATING_IP:8000
experiment_name: trend_detection
