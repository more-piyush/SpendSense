# configs/cat_distilbert_m1medium.yaml
# DistilBERT as FEATURE EXTRACTOR on Chameleon m1.medium (2 vCPU, 3.82 GB RAM, no GPU)
#
# Strategy: freeze the ENTIRE BERT backbone (embeddings + all 6 transformer
# layers) and only train the auxiliary feature embeddings + classification head.
# This reduces trainable parameters from ~66M to ~1M — ~30x faster on CPU.
#
# Why this works:
#   - DistilBERT is pre-trained on billions of tokens; its frozen features
#     are already strong for short text like transaction descriptions.
#   - The training signal only flows through the small head (a few dense
#     layers), which is fast even on CPU.
#   - Typical result: beats TF-IDF baseline on macro-F1 by capturing
#     word semantics TF-IDF misses.
#
# Expected runtime on m1.medium: ~30-45 minutes total (3 epochs)
# Expected rate: ~3-5 iterations/second on 2 CPUs

run_name: "cat_distilbert_m1medium_frozen_backbone"
model_type: distilbert

# Model
pretrained_model: distilbert-base-uncased
max_length: 48

# Training — CPU-friendly settings
learning_rate: 0.0005     # 5e-4 — much higher since we're only training the head
batch_size: 8             # Larger batch is fine — no gradient memory for BERT
epochs: 3
warmup_ratio: 0.1
weight_decay: 0.01
dropout: 0.2
freeze_layers: 6          # Freeze ALL 6 transformer layers
freeze_embeddings: true   # Also freeze embeddings (~23M params)
early_stopping_patience: 1
mixed_precision: false    # No-op on CPU

# Loss
loss: bce_with_logits

# Data
data_path: /data/categorization_training.parquet
max_samples: 30000        # Subsample train set; val/test auto-scaled to ~3750 each

# MLflow
mlflow_tracking_uri: http://mlflow:8000
experiment_name: categorization
