# configs/cat_distilbert_m1medium_v2.yaml
# DistilBERT V2: Aggressive — high LR, low dropout, small batch
# Mirrors the distilbert_v2 vs distilbert_base pattern but on frozen backbone.
# Purpose: Tests the overfitting boundary. Expects best training metrics
#   but potentially worse validation. Helps calibrate regularization.
#
# Changes from m1medium base:
#   - Much higher learning rate (2e-3 vs 5e-4) — 4x more aggressive
#   - Very small batch (4) — noisy gradients push exploration
#   - More epochs (8 vs 3) with early stopping patience=2
#   - Minimal warmup (0.05 vs 0.1)
#   - Lighter regularization (weight_decay=0.005, dropout=0.1)
#   - More data (50k vs 30k) to mitigate overfitting from low regularization
#
# Trainable params: ~1M (same frozen backbone)
# Expected runtime on m1.medium: ~90-150 minutes (up to 8 epochs, early stop likely)

run_name: "cat_distilbert_m1medium_v2_aggressive"
model_type: distilbert

# Model
pretrained_model: distilbert-base-uncased
max_length: 48

# Training — aggressive settings
learning_rate: 0.002      # 2e-3 (4x higher than base)
batch_size: 4             # Very small batch (noisy gradients)
epochs: 3                 # Reduced for CPU training time
warmup_ratio: 0.05        # Minimal warmup
weight_decay: 0.005       # Lighter regularization
dropout: 0.1              # Minimal dropout
freeze_layers: 6          # Freeze ALL transformer layers
freeze_embeddings: true   # Freeze embeddings
early_stopping_patience: 2
mixed_precision: false

# Loss
loss: bce_with_logits

# Data — loaded from MinIO training-data bucket (produced by teammate's data pipeline)
data_path: s3://training-data/bls_pipeline/categorization_training.parquet
max_samples: 50000
s3:
  endpoint_url: http://CHAMELEON_FLOATING_IP:9000
  region: us-east-1

# MLflow
mlflow_tracking_uri: http://mlflow:8000
experiment_name: categorization
