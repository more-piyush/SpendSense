# docker-compose.yml
# Full stack for Firefly III + ML Pipeline on Chameleon Cloud
#
# Usage:
#   docker compose up -d mlflow postgres firefly    # Start infrastructure
#   docker compose run --rm data-pipeline           # Run ETL pipeline
#   docker compose run --rm train-categorization    # Train categorization model
#   docker compose run --rm train-trend             # Train trend detection model

version: "3.8"

services:
  # ──────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly_password
      POSTGRES_DB: firefly
    volumes:
      - /mnt/mlflow_persist/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefly"]
      interval: 10s
      timeout: 5s
      retries: 5

  firefly:
    image: fireflyiii/core:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_KEY: ${APP_KEY:-SomeRandomStringOf32CharsExactly}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      DB_PASSWORD: firefly_password
    volumes:
      - /mnt/mlflow_persist/firefly_upload:/var/www/html/storage/upload
    ports:
      - "8080:8080"

  mlflow:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile.mlflow
    ports:
      - "8000:8000"
    volumes:
      - /mnt/mlflow_persist/mlflow_artifacts:/mlflow-artifacts
      - /mnt/mlflow_persist/mlflow_db:/app

  # ──────────────────────────────────────────────
  # DATA GENERATION (self-contained, no downloads)
  # ──────────────────────────────────────────────

  generate-data:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["generate_training_data.py", "configs/generate_data.yaml"]
    volumes:
      - training_data:/data
    profiles: ["pipeline"]

  # ──────────────────────────────────────────────
  # DATA PIPELINE
  # ──────────────────────────────────────────────

  data-pipeline:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["data_pipeline.py", "configs/data_pipeline.yaml"]
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - training_data:/data
    profiles: ["pipeline"]

  compute-features:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["compute_features.py", "configs/compute_features.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["pipeline"]

  # ──────────────────────────────────────────────
  # MODEL TRAINING
  # ──────────────────────────────────────────────

  train-cat-baseline:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_baseline_lr.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["train"]

  train-cat-distilbert-base:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_base.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-cat-distilbert-v1:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_v1.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-cat-distilbert-v2:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_v2.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-trend-rf:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_rf_baseline.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["train"]

  train-trend-xgb:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_xgb_v1.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["train"]

  train-trend-optuna:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_xgb_optuna.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["train"]

  # ──────────────────────────────────────────────
  # PROMOTION & RETRAINING
  # ──────────────────────────────────────────────

  promote:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    entrypoint: ["python", "promote_model.py"]
    command: ["configs/promote.yaml", "--run-id", "${RUN_ID}", "--action", "evaluate"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["ops"]

  retrain-categorization:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["retrain.py", "configs/retrain_categorization.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["ops"]

  retrain-trend:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["retrain.py", "configs/retrain_trend.yaml"]
    volumes:
      - training_data:/data
    depends_on:
      - mlflow
    profiles: ["ops"]

  # ──────────────────────────────────────────────
  # EXPLAINABILITY
  # ──────────────────────────────────────────────

  explain:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["explain.py", "configs/explain.yaml", "--all-users"]
    volumes:
      - training_data:/data
    profiles: ["ops"]

volumes:
  training_data:
