# docker-compose.yml
# Full stack for Firefly III + ML Pipeline on Chameleon Cloud
#
# Usage:
#   docker compose up -d mlflow postgres firefly    # Start infrastructure
#   docker compose run --rm data-pipeline           # Run ETL pipeline
#   docker compose run --rm train-categorization    # Train categorization model
#   docker compose run --rm train-trend             # Train trend detection model

services:
  # ──────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly_password
      POSTGRES_DB: firefly
    volumes:
      - /mnt/mlflow_persist/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefly"]
      interval: 10s
      timeout: 5s
      retries: 5

  firefly:
    image: fireflyiii/core:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_KEY: ${APP_KEY:-SomeRandomStringOf32CharsExactly}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      DB_PASSWORD: firefly_password
    volumes:
      - /mnt/mlflow_persist/firefly_upload:/var/www/html/storage/upload
    ports:
      - "8080:8080"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:8000
      MLFLOW_LOGGING_LEVEL: ERROR
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - /mnt/mlflow_persist/postgres_data:/var/lib/postgresql
    command: >
      /bin/sh -c "pip install psycopg2-binary boto3 &&
      mlflow server --backend-store-uri postgresql://user:password@postgres/mlflowdb
      --default-artifact-root s3://proj20-mlflow-artifacts/
      --serve-artifacts --host 0.0.0.0 --port 8000"

  # ──────────────────────────────────────────────
  # DATA GENERATION (self-contained, no downloads)
  # ──────────────────────────────────────────────

  generate-data:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["generate_training_data.py", "configs/generate_data.yaml"]
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    profiles: ["pipeline"]

  # ──────────────────────────────────────────────
  # DATA PIPELINE
  # ──────────────────────────────────────────────

  data-pipeline:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["data_pipeline.py", "configs/data_pipeline.yaml"]
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    profiles: ["pipeline"]

  compute-features:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["compute_features.py", "configs/compute_features.yaml"]
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["pipeline"]

  # ──────────────────────────────────────────────
  # MODEL TRAINING
  # ──────────────────────────────────────────────

  train-cat-baseline:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_baseline_lr.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-cat-distilbert-m1medium:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_m1medium.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-cat-distilbert-m1medium-v1:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_m1medium_v1.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-cat-distilbert-m1medium-v2:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_m1medium_v2.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-cat-distilbert-base:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_base.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-cat-distilbert-v1:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_v1.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-cat-distilbert-v2:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_categorization.py", "configs/cat_distilbert_v2.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["train"]

  train-trend-rf:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_rf_baseline.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-trend-xgb:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_xgb_v1.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  train-trend-optuna:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["train_trend_detection.py", "configs/trend_xgb_optuna.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["train"]

  # ──────────────────────────────────────────────
  # PROMOTION & RETRAINING
  # ──────────────────────────────────────────────

  promote:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    entrypoint: ["python", "promote_model.py"]
    command: ["configs/promote.yaml", "--run-id", "${RUN_ID}", "--action", "evaluate"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["ops"]

  retrain-categorization:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["retrain.py", "configs/retrain_categorization.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["ops"]

  retrain-trend:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["retrain.py", "configs/retrain_trend.yaml"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    depends_on:
      - mlflow
    profiles: ["ops"]

  # ──────────────────────────────────────────────
  # EXPLAINABILITY
  # ──────────────────────────────────────────────

  explain:
    build:
      context: ./training_scripts
      dockerfile: Dockerfile
    command: ["explain.py", "configs/explain.yaml", "--all-users"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MLFLOW_S3_IGNORE_TLS: "true"
    env_file:
      - .env
    volumes:
      - training_data:/data
      - ./training_scripts/configs:/app/configs
    profiles: ["ops"]

volumes:
  training_data:
