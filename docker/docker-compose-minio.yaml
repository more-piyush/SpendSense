version: '3.8'
services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: firefly-access-key
      MINIO_ROOT_PASSWORD: firefly-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - firefly_net

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      mc alias set local http://minio:9000 firefly-access-key firefly-secret-key &&
      mc mb -p local/raw-data || echo 'exists' &&
      mc mb -p local/processed-data || echo 'exists' &&
      mc mb -p local/training-data || echo 'exists' &&
      mc mb -p local/production-logs || echo 'exists'
      "
    networks:
      - firefly_net

volumes:
  minio_data:

networks:
  firefly_net:
    name: firefly_net
