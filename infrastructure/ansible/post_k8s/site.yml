---
- name: Bootstrap cluster extras after Kubernetes install
  hosts: control_plane
  become: true
  run_once: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    k8s_manifest_src: "{{ playbook_dir }}/../../k8s"
    k8s_manifest_dest: /opt/spendsense/k8s
    kubeconfig_tmp_path: "/tmp/spendsense-kubeconfig"
    k3s_kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
    kubectl_cmd:
      - /usr/local/bin/k3s
      - kubectl
  tasks:
    - name: Ensure K3s service is enabled and running
      ansible.builtin.service:
        name: k3s
        state: started
        enabled: true

    - name: Wait for K3s kubeconfig on control plane
      ansible.builtin.wait_for:
        path: "{{ k3s_kubeconfig_path }}"
        timeout: 180

    - name: Wait for Kubernetes API port on control plane
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 6443
        delay: 5
        timeout: 240

    - name: Wait for Kubernetes API to become reachable
      ansible.builtin.command: "{{ kubectl_cmd + ['get', 'nodes'] }}"
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig_path }}"
      register: kubectl_ready
      retries: 24
      delay: 10
      until: kubectl_ready.rc == 0
      changed_when: false

    - name: Ensure kubectl shim exists
      ansible.builtin.file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link
        force: true

    - name: Create working directory
      ansible.builtin.file:
        path: "{{ k8s_manifest_dest }}"
        state: directory
        mode: "0755"

    - name: Copy repository Kubernetes manifests to control plane
      ansible.builtin.copy:
        src: "{{ k8s_manifest_src }}/"
        dest: "{{ k8s_manifest_dest }}/"
        mode: preserve

    - name: Create platform namespace
      ansible.builtin.command: "{{ kubectl_cmd + ['apply', '-f', k8s_manifest_dest + '/namespace/namespace.yaml'] }}"
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig_path }}"
      register: namespace_apply
      retries: 12
      delay: 10
      until: namespace_apply.rc == 0
      changed_when: false

    - name: Apply storage manifests
      ansible.builtin.command: "{{ kubectl_cmd + ['apply', '-f', item] }}"
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig_path }}"
      register: storage_apply
      retries: 12
      delay: 10
      until: storage_apply.rc == 0
      loop:
        - "{{ k8s_manifest_dest }}/storage/pvc-postgres.yaml"
        - "{{ k8s_manifest_dest }}/storage/pvc-minio.yaml"
        - "{{ k8s_manifest_dest }}/storage/pvc-training-state.yaml"
      changed_when: false

    - name: Fetch kubeconfig to local machine
      ansible.builtin.fetch:
        src: "{{ k3s_kubeconfig_path }}"
        dest: "{{ kubeconfig_tmp_path }}"
        flat: true

    - name: Rewrite kubeconfig server endpoint locally
      delegate_to: localhost
      become: false
      ansible.builtin.replace:
        path: "{{ kubeconfig_tmp_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Ensure local kubeconfig directory exists
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ kubeconfig_local_path | dirname }}"
        state: directory
        mode: "0700"
      when: (kubeconfig_local_path | dirname) != "/tmp"

    - name: Install kubeconfig locally
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        src: "{{ kubeconfig_tmp_path }}"
        dest: "{{ kubeconfig_local_path }}"
        mode: "0600"
        remote_src: true
