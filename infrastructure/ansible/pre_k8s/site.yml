---
- name: Prepare Chameleon nodes for Kubernetes
  hosts: k8s_cluster
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    effective_containerd_data_root: "{{ containerd_data_root | default('/data/containerd') }}"
    effective_docker_data_root: "{{ docker_data_root | default('/data/docker') }}"
    effective_k3s_data_dir: "{{ k3s_data_dir | default('/data/k3s') }}"
    effective_k3s_local_storage_path: "{{ k3s_local_storage_path | default('/data/local-path-provisioner') }}"
    effective_build_cache_root: "{{ build_cache_root | default('/data/tmp') }}"
  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - docker.io
          - gnupg
          - jq
          - nfs-common
          - rsync
          - unzip
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure containerd service is enabled and running
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true

    - name: Add SSH user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(.*\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Persist required kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Load overlay kernel module
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Load br_netfilter kernel module
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Configure Kubernetes sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Wait for attached data volume device on control plane
      ansible.builtin.wait_for:
        path: "{{ data_volume_device }}"
        timeout: 120
      when: inventory_hostname in groups['control_plane']

    - name: Detect existing filesystem on attached data volume
      ansible.builtin.command: blkid -o value -s TYPE {{ data_volume_device }}
      register: data_volume_fs
      failed_when: false
      changed_when: false
      when: inventory_hostname in groups['control_plane']

    - name: Create ext4 filesystem on attached data volume if needed
      ansible.builtin.command: mkfs.{{ data_volume_filesystem }} -F {{ data_volume_device }}
      when:
        - inventory_hostname in groups['control_plane']
        - data_volume_fs.stdout | trim == ""

    - name: Ensure data mount path exists on control plane
      ansible.builtin.file:
        path: "{{ data_volume_mount_path }}"
        state: directory
        mode: "0755"
      when: inventory_hostname in groups['control_plane']

    - name: Mount attached data volume on control plane
      ansible.posix.mount:
        path: "{{ data_volume_mount_path }}"
        src: "{{ data_volume_device }}"
        fstype: "{{ data_volume_filesystem }}"
        state: mounted
      when: inventory_hostname in groups['control_plane']

    - name: Ensure Docker data root exists on control plane
      ansible.builtin.file:
        path: "{{ effective_docker_data_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: inventory_hostname in groups['control_plane']

    - name: Ensure containerd data root exists on control plane
      ansible.builtin.file:
        path: "{{ effective_containerd_data_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: inventory_hostname in groups['control_plane']

    - name: Ensure K3s data directories exist on control plane
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ effective_k3s_data_dir }}"
        - "{{ effective_k3s_local_storage_path }}"
      when: inventory_hostname in groups['control_plane']

    - name: Ensure build cache root exists and is writable on control plane
      ansible.builtin.file:
        path: "{{ effective_build_cache_root }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "1777"
      when: inventory_hostname in groups['control_plane']

    - name: Configure Docker data-root on control plane
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "data-root": "{{ effective_docker_data_root }}",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      when: inventory_hostname in groups['control_plane']
      notify: Restart Docker

    - name: Configure containerd root on control plane
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        mode: "0644"
        content: |
          version = 2
          root = "{{ effective_containerd_data_root }}"
          state = "/run/containerd"

          [grpc]
            address = "/run/containerd/containerd.sock"
      when: inventory_hostname in groups['control_plane']
      notify:
        - Restart containerd
        - Restart Docker

    - name: Flush Docker restart if configuration changed
      ansible.builtin.meta: flush_handlers

    - name: Install Helm on control plane
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
      when: inventory_hostname in groups['control_plane']
