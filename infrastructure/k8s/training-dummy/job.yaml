apiVersion: batch/v1
kind: Job
metadata:
  name: training-dummy
  namespace: firefly-platform
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: training-dummy
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "dummy training job started"
              date
              echo "dummy-model-version=0.0.1"
              echo "training complete"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
  backoffLimit: 0
