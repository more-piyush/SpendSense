apiVersion: batch/v1
kind: CronJob
metadata:
  name: monthly-retrain
  namespace: firefly-platform
spec:
  schedule: "0 4 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: monthly-retrain
              image: docker.io/spendsense/training:registry-v1
              imagePullPolicy: IfNotPresent
              command: ["python", "retrain.py", "/app/runtime-config/retrain_trend.yaml"]
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_USER
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_PASSWORD
                - name: MLFLOW_S3_ENDPOINT_URL
                  value: http://minio.firefly-platform.svc.cluster.local:9000
              volumeMounts:
                - name: runtime-config
                  mountPath: /app/runtime-config/retrain_trend.yaml
                  subPath: retrain_trend.yaml
                - name: training-data
                  mountPath: /data
              resources:
                requests:
                  cpu: "2"
                  memory: "8Gi"
                limits:
                  cpu: "8"
                  memory: "32Gi"
          volumes:
            - name: runtime-config
              configMap:
                name: training-config
            - name: training-data
              persistentVolumeClaim:
                claimName: training-state-pvc
