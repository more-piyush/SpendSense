apiVersion: batch/v1
kind: CronJob
metadata:
  name: monthly-retrain
  namespace: firefly-platform
spec:
  schedule: "0 4 1 * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: monthly-retrain
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "monthly retrain"
                  date
