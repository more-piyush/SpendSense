apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-eval
  namespace: firefly-platform
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: nightly-eval
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "nightly evaluation"
                  date
