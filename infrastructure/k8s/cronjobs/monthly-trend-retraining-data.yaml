apiVersion: batch/v1
kind: CronJob
metadata:
  name: monthly-trend-retraining-data
  namespace: firefly-platform
spec:
  schedule: "30 3 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: monthly-trend-retraining-data
              image: spendsense/firefly-retraining:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "run_pipeline.py", "trend"]
              envFrom:
                - configMapRef:
                    name: retraining-config
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_PASSWORD
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
