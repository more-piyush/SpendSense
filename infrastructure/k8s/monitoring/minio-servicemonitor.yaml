apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: minio
  namespaceSelector:
    matchNames:
      - firefly-platform
  endpoints:
    - port: api
      path: /minio/v2/metrics/cluster
      interval: 30s
