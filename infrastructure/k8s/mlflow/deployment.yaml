apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: firefly-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.9.0
          command: ["/bin/sh", "-c"]
          args:
            - >
              pip install psycopg2-binary boto3 &&
              mlflow server
              --host 0.0.0.0
              --port 5000
              --backend-store-uri postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.firefly-platform.svc.cluster.local:5432/firefly
              --no-serve-artifacts
              --default-artifact-root s3://mlflow/experiments
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.firefly-platform.svc.cluster.local:9000
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "*"
            - name: MLFLOW_SERVER_CORS_ALLOWED_ORIGINS
              value: "*"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: GUNICORN_CMD_ARGS
              value: "--workers 1 --timeout 120"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
