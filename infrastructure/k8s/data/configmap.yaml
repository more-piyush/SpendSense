apiVersion: v1
kind: ConfigMap
metadata:
  name: data-pipeline-config
  namespace: firefly-platform
data:
  config.yaml: |
    data_mode: preprocessed
    raw_data_dir: /data/raw
    output_dir: /data

    s3:
      endpoint_url: http://minio.firefly-platform.svc.cluster.local:9000
      bucket: processed-data
      access_key: null
      secret_key: null
      region: us-east-1
      processed_prefix: bls_ce_survey/processed/
      hg_key: raw/CE-HG-Integ-2024.txt

    output_s3:
      bucket: training-data
      cat_key: bls_pipeline/categorization_training.parquet
      trend_key: bls_pipeline/trend_training.parquet
      report_key: bls_pipeline/pipeline_report.json

    upload_outputs: true
    n_personas: 750
    min_transactions_per_persona: 5
    min_amount: 0.01
    max_amount: 50000.0
    train_ratio: 0.70
    val_ratio: 0.15
    test_ratio: 0.15
