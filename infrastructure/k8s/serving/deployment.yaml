apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-baseline
  namespace: firefly-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving-baseline
  template:
    metadata:
      labels:
        app: serving-baseline
    spec:
      containers:
        - name: serving-baseline
          image: pranalithakkar/serving-baseline:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
