apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-baseline
  namespace: firefly-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving-baseline
  template:
    metadata:
      labels:
        app: serving-baseline
    spec:
      containers:
        - name: serving-baseline
          image: docker.io/spendsense/serving-unified:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ACTIVE_MODELS_PATH
              value: s3://mlflow/registry/active_models.json
            - name: S3_ENDPOINT_URL
              value: http://minio.firefly-platform.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: FEEDBACK_STORE_PATH
              value: /tmp/spendsense-serving-feedback.jsonl
            - name: PRODUCTION_LOGS_BUCKET
              value: production-logs
            - name: PRODUCTION_LOGS_PREFIX
              value: serving
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
